	<script>
		document.addEventListener("DOMContentLoaded", function () {

			const tabContainer = document.querySelector(".inner_tab_mainbox .nav-pills");
			const leftBtn = document.getElementById("tabLeft");
			const rightBtn = document.getElementById("tabRight");

			function updateArrows() {

				if (tabContainer.scrollLeft > 0) {
					leftBtn.classList.add("active");
					leftBtn.classList.remove("disabled");
				} else {
					leftBtn.classList.remove("active");
					leftBtn.classList.add("disabled");
				}

				if (tabContainer.scrollLeft + tabContainer.clientWidth < tabContainer.scrollWidth) {
					rightBtn.classList.add("active");
					rightBtn.classList.remove("disabled");
				} else {
					rightBtn.classList.remove("active");
					rightBtn.classList.add("disabled");
				}
			}

			leftBtn.addEventListener("click", () => {
				tabContainer.scrollBy({ left: -250, behavior: "smooth" });
			});

			rightBtn.addEventListener("click", () => {
				tabContainer.scrollBy({ left: 250, behavior: "smooth" });
			});

			tabContainer.addEventListener("scroll", updateArrows);

			updateArrows(); // initial check

		});
	</script>
	<script>

		function toggleMenu() {
			document.getElementById("mobileMenu").classList.toggle("open");
			document.getElementById("overlay").classList.toggle("active");
		}

		document.querySelectorAll(".mobile-menu .has-sub > a").forEach(item => {
			item.addEventListener("click", function (e) {

				let parent = this.parentElement;

				if (parent.querySelector("ul")) {
					e.preventDefault();
					parent.classList.toggle("open");

					let submenu = parent.querySelector("ul");

					if (submenu.style.display === "block") {
						submenu.style.display = "none";
					} else {
						submenu.style.display = "block";
					}
				}

			});
		});

	</script>
	<script>
		document.addEventListener("click", function(e){

		if(e.target.closest(".mobile-menu .has-dropdown > a")){
		e.preventDefault();

		let link = e.target.closest("a");
		let parent = link.parentElement;
		let submenu = parent.querySelector(".submenu");
		let arrow = link.querySelector(".arrow");

		parent.classList.toggle("open");

		if(submenu.style.display === "block"){
			submenu.style.display = "none";
			arrow.textContent = "+";
		}else{
			submenu.style.display = "block";
			arrow.textContent = "-";
		}
		}

		});
	</script>
